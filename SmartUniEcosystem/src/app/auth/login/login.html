<div
  class="min-h-screen bg-brand-light dark:bg-brand-dark flex items-center justify-center p-4 relative overflow-hidden"
>
  <!-- Decorative background elements -->
  <div
    class="absolute top-0 right-0 w-[600px] h-[600px] bg-gradient-to-bl from-mit-red/10 to-transparent rounded-full blur-[100px] translate-x-1/3 -translate-y-1/3"
  ></div>
  <div
    class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-gradient-to-tr from-primary-600/10 to-transparent rounded-full blur-[100px] -translate-x-1/3 translate-y-1/3"
  ></div>

  <div class="glass-panel w-full max-w-md p-8 relative z-10 animate-fade-in-up">
    <div class="text-center mb-8">
      <div
        class="w-16 h-16 bg-gradient-to-br from-mit-red to-primary-600 rounded-2xl flex items-center justify-center text-white font-black text-3xl shadow-xl mx-auto mb-6 transform rotate-3 hover:rotate-6 transition-transform"
      >
        S
      </div>
      <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">
        Welcome Back
      </h2>
      <p class="text-slate-500 mt-2 text-sm">Sign in to your Academy Management Portal</p>
    </div>

    <!-- Error Alert -->
    <div
      *ngIf="errorMessage"
      class="bg-red-50 dark:bg-red-900/20 border-l-4 border-mit-red p-4 mb-6 rounded-r-lg animate-fade-in"
    >
      <p class="text-sm text-red-700 dark:text-red-400 font-medium">{{ errorMessage }}</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2"
          >Email Address</label
        >
        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-mit-red focus:border-mit-red text-slate-900 dark:text-white outline-none transition-all"
          placeholder="Enter your email"
        />
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">Password</label>
          <a
            href="#"
            class="text-xs font-bold text-mit-red hover:text-primary-600 transition-colors"
            >Forgot Password?</a
          >
        </div>
        <input
          type="password"
          formControlName="password"
          class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-mit-red focus:border-mit-red text-slate-900 dark:text-white outline-none transition-all"
          placeholder="Enter your password"
        />
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full py-3.5 bg-gradient-to-r from-mit-red to-primary-600 text-white rounded-xl font-bold text-lg shadow-lg shadow-mit-red/30 hover:shadow-mit-red/50 hover:scale-[1.02] transition-all disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center gap-2 mt-2"
      >
        <svg
          *ngIf="isLoading"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="animate-spin"
        >
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
        <span>{{ isLoading ? 'Signing in...' : 'Sign In' }}</span>
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-800 text-center">
      <p class="text-sm text-slate-500">Demo Accounts:</p>
      <div class="flex flex-wrap gap-2 justify-center mt-3">
        <span
          class="px-2 py-1 bg-slate-100 dark:bg-slate-800 text-xs font-medium rounded text-slate-600 dark:text-slate-400"
          >super@smartuni.edu</span
        >
        <span
          class="px-2 py-1 bg-slate-100 dark:bg-slate-800 text-xs font-medium rounded text-slate-600 dark:text-slate-400"
          >student@smartuni.edu</span
        >
        <span
          class="px-2 py-1 bg-slate-100 dark:bg-slate-800 text-xs font-medium rounded text-slate-600 dark:text-slate-400"
          >faculty@smartuni.edu</span
        >
      </div>
      <p class="text-xs text-slate-400 mt-2">Password: password</p>
    </div>
  </div>
</div>
