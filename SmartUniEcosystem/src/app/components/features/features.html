<section class="py-20 bg-slate-50 dark:bg-slate-900">
  <div class="container mx-auto px-4 md:px-6 lg:px-8">
    <div class="text-center max-w-3xl mx-auto mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-slate-900 dark:text-white mb-4">A Complete Ecosystem for Modern Education</h2>
      <p class="text-lg text-slate-600 dark:text-slate-400">Everything you need to manage, scale, and innovate your university in a single, unified platform.</p>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let feature of features; let i = index" 
           class="group glass-card rounded-2xl p-8 hover:-translate-y-2 transition-all duration-300 relative overflow-hidden">
        <!-- Hover Gradient Background -->
        <div class="absolute inset-0 bg-gradient-to-br {{feature.color}} opacity-0 group-hover:opacity-5 transition-opacity duration-300"></div>
        
        <!-- Icon Container -->
        <div class="w-14 h-14 rounded-xl mb-6 flex items-center justify-center bg-gradient-to-br {{feature.color}} shadow-lg text-white transform group-hover:scale-110 transition-transform duration-300">
          <!-- ERP Icon -->
          <svg *ngIf="feature.icon === 'svg-erp'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          
          <!-- LMS Icon -->
          <svg *ngIf="feature.icon === 'svg-lms'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
          
          <!-- Exam Icon -->
          <svg *ngIf="feature.icon === 'svg-exam'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
          
          <!-- Finance Icon -->
          <svg *ngIf="feature.icon === 'svg-finance'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          
          <!-- Analytics Icon -->
          <svg *ngIf="feature.icon === 'svg-analytics'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
          
          <!-- Campus Icon -->
          <svg *ngIf="feature.icon === 'svg-campus'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M9 8h1"/><path d="M9 12h1"/><path d="M9 16h1"/><path d="M14 8h1"/><path d="M14 12h1"/><path d="M14 16h1"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/></svg>
        </div>
        
        <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-3">{{feature.title}}</h3>
        <p class="text-slate-600 dark:text-slate-400 leading-relaxed">{{feature.description}}</p>
        
        <!-- Animated arrow on hover -->
        <div class="mt-6 flex items-center text-sm font-semibold text-mit-red dark:text-primary-400 opacity-0 transform -translate-x-4 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">
          Explore Feature 
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-1"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </div>
      </div>
    </div>
  </div>
</section>
