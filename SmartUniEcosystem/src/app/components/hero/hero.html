<section class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
  <!-- Abstract Background Elements -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
    <div
      class="absolute -top-40 -right-40 w-96 h-96 rounded-full bg-primary-500/10 blur-[100px]"
    ></div>
    <div class="absolute top-1/4 -left-40 w-80 h-80 rounded-full bg-blue-500/10 blur-[100px]"></div>
    <div
      class="absolute bottom-0 left-1/3 w-[800px] h-[300px] bg-gradient-to-r from-mit-red/5 to-purple-500/5 blur-[120px]"
    ></div>
    <div
      class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMTQ4LCAxNjMsIDE4NCwgMC4xKSIvPjwvc3ZnPg==')] [mask-image:linear-gradient(to_bottom,white,transparent)]"
    ></div>
  </div>

  <div class="container mx-auto px-4 md:px-6 lg:px-8">
    <div class="grid lg:grid-cols-2 gap-12 lg:gap-8 items-center">
      <!-- Text Content -->
      <div class="text-center lg:text-left space-y-8 animate-[fadeUp_0.8s_ease-out_forwards]">
        <div
          class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-mit-red/10 border border-mit-red/20 text-mit-red dark:text-red-400 text-sm font-semibold mb-2"
        >
          <span class="relative flex h-2 w-2">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-mit-red opacity-75"
            ></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-mit-red"></span>
          </span>
          {{ hero().eyebrow }}
        </div>

        <h1
          class="text-5xl md:text-6xl lg:text-7xl font-extrabold tracking-tight text-slate-900 dark:text-white leading-[1.1]"
        >
          {{ hero().title }}
        </h1>

        <p class="text-lg md:text-xl text-slate-600 dark:text-slate-300 max-w-2xl mx-auto lg:mx-0">
          {{ hero().description }}
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4">
          <button
            routerLink="/login"
            class="w-full sm:w-auto px-8 py-4 rounded-xl bg-slate-900 text-white dark:bg-white dark:text-slate-900 font-bold text-lg hover:bg-mit-red dark:hover:bg-primary-500 dark:hover:text-white transition-all transform hover:-translate-y-1 shadow-xl hover:shadow-mit-red/20"
          >
            Start Free Demo
          </button>
          <button
            routerLink="/platform"
            class="w-full sm:w-auto px-8 py-4 rounded-xl bg-white dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 font-bold text-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-all"
          >
            Explore Platform
          </button>
        </div>

        <div
          class="pt-6 flex items-center justify-center lg:justify-start gap-6 text-sm font-medium text-slate-500 dark:text-slate-400"
        >
          <div class="flex items-center gap-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-emerald-500"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <path d="m9 11 3 3L22 4" />
            </svg>
            No credit card
          </div>
          <div class="flex items-center gap-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-emerald-500"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <path d="m9 11 3 3L22 4" />
            </svg>
            14-day trial
          </div>
        </div>
      </div>

      <!-- Dashboard Visual -->
      <div class="relative lg:h-[600px] animate-[fadeLeft_1s_ease-out_forwards]">
        <!-- Main Dashboard Card -->
        <div
          class="relative z-10 glass-card rounded-2xl border border-white/50 dark:border-slate-700/50 shadow-2xl overflow-hidden translate-x-4 lg:translate-x-12 translate-y-8"
        >
          <div
            class="h-10 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex items-center px-4 gap-2"
          >
            <div class="w-3 h-3 rounded-full bg-red-400"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
            <div class="w-3 h-3 rounded-full bg-emerald-400"></div>
          </div>
          <div class="p-6 bg-white/60 dark:bg-slate-900/60 backdrop-blur-md h-[400px]">
            <!-- Dashboard Mockup -->
            <div class="flex items-center justify-between mb-6">
              <div>
                <div class="h-4 w-32 bg-slate-200 dark:bg-slate-700 rounded-full mb-2"></div>
                <div class="h-8 w-48 bg-slate-300 dark:bg-slate-600 rounded-lg"></div>
              </div>
              <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/50"></div>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-6">
              <div
                class="h-24 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-4"
              >
                <div class="h-3 w-16 bg-emerald-200 dark:bg-emerald-900/50 rounded mb-2"></div>
                <div class="h-6 w-24 bg-emerald-500 rounded mt-4"></div>
              </div>
              <div
                class="h-24 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-4"
              >
                <div class="h-3 w-16 bg-blue-200 dark:bg-blue-900/50 rounded mb-2"></div>
                <div class="h-6 w-20 bg-blue-500 rounded mt-4"></div>
              </div>
              <div
                class="h-24 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-4"
              >
                <div class="h-3 w-16 bg-purple-200 dark:bg-purple-900/50 rounded mb-2"></div>
                <div class="h-6 w-24 bg-purple-500 rounded mt-4"></div>
              </div>
            </div>

            <div
              class="h-40 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-4 flex items-end gap-2"
            >
              <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-t h-[40%]"></div>
              <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-t h-[60%]"></div>
              <div class="w-full bg-primary-500 rounded-t h-[80%]"></div>
              <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-t h-[50%]"></div>
              <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-t h-[70%]"></div>
              <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-t h-[90%]"></div>
              <div class="w-full bg-primary-500 rounded-t h-[100%]"></div>
            </div>
          </div>
        </div>

        <!-- Floating Elements -->
        <div
          class="absolute -top-6 -left-6 z-20 glass-card p-4 rounded-xl border border-white/40 shadow-xl animate-[float_6s_ease-in-out_infinite]"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-emerald-100 dark:bg-emerald-900/50 flex items-center justify-center text-emerald-600"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <path d="m9 11 3 3L22 4" />
              </svg>
            </div>
            <div>
              <p class="text-xs text-slate-500 font-medium">System Status</p>
              <p class="font-bold text-slate-800 dark:text-white">99.99% Uptime</p>
            </div>
          </div>
        </div>

        <div
          class="absolute top-1/2 -right-8 z-20 glass-card p-4 rounded-xl border border-white/40 shadow-xl animate-[float_8s_ease-in-out_infinite_reverse]"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-mit-red/10 flex items-center justify-center text-mit-red"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
              </svg>
            </div>
            <div>
              <p class="text-xs text-slate-500 font-medium">Active Students</p>
              <p class="font-bold text-slate-800 dark:text-white">45,231</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<style>
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes fadeLeft {
    from {
      opacity: 0;
      transform: translateX(40px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }
  @keyframes float {
    0% {
      transform: translateY(0px);
    }
    50% {
      transform: translateY(-15px);
    }
    100% {
      transform: translateY(0px);
    }
  }
</style>
