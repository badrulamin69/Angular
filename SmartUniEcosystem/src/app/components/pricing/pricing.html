<section class="py-24 bg-brand-light dark:bg-brand-dark animate-fade-in">
  <div class="container mx-auto px-4 md:px-6 lg:px-8">
    <div class="text-center max-w-3xl mx-auto mb-16 animate-on-scroll">
      <h2 class="text-3xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-6">
        Transparent SaaS Pricing
      </h2>
      <p class="text-lg text-slate-600 dark:text-slate-400 mb-8">
        Scale your digital infrastructure effortlessly. From small specialized academies to global
        multi-campus university networks.
      </p>

      <!-- Toggle -->
      <div
        class="inline-flex items-center p-1 bg-slate-200 dark:bg-slate-800 rounded-xl hover:shadow-lg transition-all duration-300"
      >
        <button
          class="px-6 py-2 rounded-lg text-sm font-bold transition-all"
          [ngClass]="
            isAnnual()
              ? 'bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm scale-105'
              : 'text-slate-500'
          "
          (click)="toggleAnnual(true)"
        >
          Annual (Save 20%)
        </button>
        <button
          class="px-6 py-2 rounded-lg text-sm font-bold transition-all"
          [ngClass]="
            !isAnnual()
              ? 'bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm scale-105'
              : 'text-slate-500'
          "
          (click)="toggleAnnual(false)"
        >
          Monthly
        </button>
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">
      <div
        *ngFor="let plan of plans()"
        [ngClass]="
          plan.popular
            ? 'border-2 border-mit-red dark:border-primary-500 bg-white dark:bg-slate-800 shadow-2xl md:-translate-y-4'
            : 'glass-card border border-slate-200 dark:border-slate-800'
        "
        class="rounded-3xl p-8 animate-on-scroll hover:-translate-y-2 transition-all duration-300 relative"
      >
        <div
          *ngIf="plan.popular"
          class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-mit-red text-white px-4 py-1 rounded-full text-xs font-bold tracking-wider uppercase"
        >
          Most Popular
        </div>

        <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">{{ plan.name }}</h3>
        <p class="text-slate-500 text-sm mb-6">{{ plan.description }}</p>

        <div class="mb-6">
          <ng-container *ngIf="plan.monthly !== 'Custom'; else customPrice">
            <span
              class="text-4xl font-extrabold text-slate-900 dark:text-white transition-all duration-500"
            >
              ${{ isAnnual() ? plan.annual : plan.monthly }}
            </span>
            <span class="text-slate-500 font-medium">/mo</span>
          </ng-container>
          <ng-template #customPrice>
            <span class="text-4xl font-extrabold text-slate-900 dark:text-white">{{
              plan.monthly
            }}</span>
          </ng-template>
        </div>

        <button
          routerLink="/login"
          [ngClass]="
            plan.popular
              ? 'bg-gradient-to-r from-mit-red to-primary-600 text-white'
              : 'border-2 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'
          "
          class="w-full py-3 rounded-xl font-bold transition-all mb-8 hover:scale-[1.02]"
        >
          {{ plan.buttonText }}
        </button>

        <ul class="space-y-4">
          <li
            *ngFor="let feature of plan.features"
            class="flex items-center gap-3 text-slate-600 dark:text-slate-300 text-sm font-medium"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-emerald-500"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <path d="m9 11 3 3L22 4" />
            </svg>
            {{ feature }}
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
